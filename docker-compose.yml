services:
  postgres:
    image: postgres:15-alpine
    container_name: ordemparanormal-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordemparanormal
      PGDATA: /data/postgres
    volumes:
      - ./data/pg:/data/postgres

  redis:
    image: redis:7-alpine
    container_name: ordemparanormal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
